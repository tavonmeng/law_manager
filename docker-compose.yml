version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_PATH=/app/data/test_records.db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - TZ=Asia/Shanghai
      - API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
