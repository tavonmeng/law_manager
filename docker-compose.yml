version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    restart: always
    environment:
      - TZ=Asia/Shanghai

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - backend
    restart: always
